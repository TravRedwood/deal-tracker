<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in — Deal Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9fafb;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:32px;width:100%;max-width:360px}
  .logo{font-size:18px;font-weight:700;color:#111827;margin-bottom:6px}
  .sub{font-size:13px;color:#6b7280;margin-bottom:24px}
  label{font-size:13px;color:#374151;display:block;margin-bottom:5px}
  input{width:100%;font-size:14px;padding:8px 12px;border:1px solid #e5e7eb;border-radius:7px;color:#111827;margin-bottom:14px;height:38px}
  input:focus{outline:none;border-color:#6b7280}
  button{width:100%;font-size:14px;font-weight:500;padding:9px;border:none;border-radius:7px;background:#1c1c1a;color:#f9fafb;cursor:pointer;height:38px}
  button:hover{background:#2c2c2a}
  .error{font-size:12px;color:#dc2626;margin-bottom:12px;background:#fef2f2;padding:8px 10px;border-radius:6px}
  .note{font-size:11px;color:#9ca3af;text-align:center;margin-top:14px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Deal Tracker</div>
  <div class="sub">Your business acquisition dashboard</div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label>Password</label>
    <input type="password" name="password" placeholder="Enter your dashboard password" autofocus>
    <button type="submit">Sign in</button>
  </form>
  <div class="note">Or use the magic link from your weekly digest email</div>
</div>
</body>
</html>
